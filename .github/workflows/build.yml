name: Build FOSS Debug APK

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build FOSS Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: on-success

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Metrolist Debug,O=Metrolist,C=US"

      - name: Build FOSS Debug APK
        run: ./gradlew --console=plain assembleFossDebug --warning-mode summary
        env:
          METROLIST_APPLICATION_ID: com.metrolist.music.debug
          METROLIST_APP_NAME: Metrolist Debug
          METROLIST_DEBUG_KEYSTORE_PATH: debug.keystore
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v6
        with:
          name: metrolist-foss-debug-apk
          path: app/build/outputs/apk/foss/debug/*.apk
